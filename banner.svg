<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0a0e1a; }
      .grid-line { stroke: rgba(0,212,255,0.06); stroke-width: 1; }
      .name { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; fill: url(#nameGrad); }
      .title { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 400; fill: #00d4ff; letter-spacing: 3px; }
      .desc { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #64748b; }
      .desc-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #94a3b8; }
      .prompt { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #00d4ff; }
      .cmd { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #00ff88; }
      .metric-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; fill: #00d4ff; }
      .metric-lbl { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #64748b; letter-spacing: 1.5px; }
      .badge-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; }
      .cursor { fill: #00d4ff; }
      .ring-outer { fill: none; stroke-width: 3; }
      .ring-inner { fill: #141d35; }
      .avatar-text { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; fill: #00d4ff; }

      /* fade in whole banner */
      .fade-in { animation: fadeIn 1s ease forwards; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      /* scanline sweep */
      .scanline { animation: scan 5s linear infinite; }
      @keyframes scan {
        0% { transform: translateY(-5px); opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { transform: translateY(285px); opacity: 0; }
      }

      /* spinning ring */
      .spin { transform-origin: 72px 110px; animation: spin 5s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* pulse dot */
      .pdot { animation: pdot 2s ease-in-out infinite; }
      @keyframes pdot {
        0%,100% { opacity: 1; r: 4px; }
        50% { opacity: 0.4; r: 5px; }
      }

      /* stagger text reveals */
      .r1 { animation: slideUp 0.6s 0.1s ease both; }
      .r2 { animation: slideUp 0.6s 0.25s ease both; }
      .r3 { animation: slideUp 0.6s 0.4s ease both; }
      .r4 { animation: slideUp 0.6s 0.55s ease both; }
      .r5 { animation: slideUp 0.6s 0.7s ease both; }
      .r6 { animation: slideUp 0.6s 0.85s ease both; }
      .r7 { animation: slideUp 0.6s 1.0s ease both; }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* badge pulse */
      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }

      /* metric count-up shimmer */
      .shimmer { animation: shimmer 3s ease-in-out infinite; }
      @keyframes shimmer {
        0%,100% { opacity: 0.85; }
        50% { opacity: 1; }
      }

      /* terminal line appear */
      .tl1 { animation: appear 0.01s 1.2s both; }
      .tl2 { animation: appear 0.01s 1.6s both; }
      .tl3 { animation: appear 0.01s 2.0s both; }
      .cursor-blink { animation: blink 1s step-end infinite; animation-delay: 2.2s; }
      @keyframes appear { from { opacity: 0; } to { opacity: 1; } }
    </style>

    <!-- name gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- spinning ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- metric card bg -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>

    <!-- glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- scanline clip -->
    <clipPath id="bannerClip">
      <rect width="900" height="280" rx="0"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="900" height="280" class="bg"/>

  <!-- grid lines -->
  <g opacity="1">
    <line x1="0" y1="40" x2="900" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="900" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="900" y2="240" class="grid-line"/>
    <line x1="90" y1="0" x2="90" y2="280" class="grid-line"/>
    <line x1="180" y1="0" x2="180" y2="280" class="grid-line"/>
    <line x1="270" y1="0" x2="270" y2="280" class="grid-line"/>
    <line x1="360" y1="0" x2="360" y2="280" class="grid-line"/>
    <line x1="450" y1="0" x2="450" y2="280" class="grid-line"/>
    <line x1="540" y1="0" x2="540" y2="280" class="grid-line"/>
    <line x1="630" y1="0" x2="630" y2="280" class="grid-line"/>
    <line x1="720" y1="0" x2="720" y2="280" class="grid-line"/>
    <line x1="810" y1="0" x2="810" y2="280" class="grid-line"/>
  </g>

  <!-- scanline sweep -->
  <g clip-path="url(#bannerClip)">
    <rect class="scanline" x="0" y="0" width="900" height="2" fill="url(#nameGrad)" opacity="0.3"/>
  </g>

  <!-- LEFT: Avatar ring + name block -->

  <!-- spinning ring -->
  <g class="spin">
    <circle cx="72" cy="110" r="44" class="ring-outer" stroke="url(#ringGrad)"/>
  </g>
  <!-- static inner circle -->
  <circle cx="72" cy="110" r="40" class="ring-inner"/>
  <circle cx="72" cy="110" r="40" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="72" y="117" text-anchor="middle" class="avatar-text">HS</text>

  <!-- status dot -->
  <circle cx="107" cy="80" r="6" fill="#0a0e1a" stroke="#00ff88" stroke-width="1.5"/>
  <circle cx="107" cy="80" r="4" fill="#00ff88" class="pdot"/>

  <!-- name + title -->
  <g class="r1">
    <text x="132" y="88" class="name">Himanshu Shukla</text>
  </g>
  <g class="r2">
    <text x="133" y="110" class="title">CLOUD &amp; AI AUTOMATION ENGINEER</text>
  </g>

  <!-- terminal block -->
  <rect x="132" y="122" width="380" height="76" rx="6" fill="#0f1629" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

  <!-- terminal dots -->
  <circle cx="147" cy="134" r="4" fill="#ff4757" opacity="0.8"/>
  <circle cx="161" cy="134" r="4" fill="#ffb020" opacity="0.8"/>
  <circle cx="175" cy="134" r="4" fill="#00ff88" opacity="0.8"/>

  <g class="tl1">
    <text x="144" y="153" class="prompt">$ </text>
    <text x="158" y="153" class="cmd">cat profile.json</text>
  </g>
  <g class="tl2">
    <text x="144" y="169" class="desc">  aws: </text>
    <text x="188" y="169" class="desc-val">"EC2 · ECS · Lambda · RDS · SQS · Terraform"</text>
  </g>
  <g class="tl3">
    <text x="144" y="184" class="desc">  win: </text>
    <text x="188" y="184" class="desc-val">"€12K revenue · 8,000 leads · 60 days"</text>
  </g>
  <g class="cursor-blink">
    <rect x="144" y="192" width="7" height="12" class="cursor" opacity="0"/>
    <!-- cursor starts hidden, blink handles it -->
    <rect x="144" y="194" width="7" height="2" fill="#00d4ff" class="blink"/>
  </g>

  <!-- divider -->
  <line x1="30" y1="215" x2="520" y2="215" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>

  <!-- badges row -->
  <g class="r5">
    <!-- AWS badge -->
    <rect x="30" y="225" width="58" height="20" rx="10" fill="rgba(255,176,32,0.1)" stroke="rgba(255,176,32,0.35)" stroke-width="1"/>
    <text x="59" y="238" text-anchor="middle" class="badge-text" fill="#ffb020">AWS</text>

    <!-- Docker badge -->
    <rect x="96" y="225" width="64" height="20" rx="10" fill="rgba(74,158,255,0.1)" stroke="rgba(74,158,255,0.35)" stroke-width="1"/>
    <text x="128" y="238" text-anchor="middle" class="badge-text" fill="#4a9eff">Docker</text>

    <!-- Terraform badge -->
    <rect x="168" y="225" width="76" height="20" rx="10" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
    <text x="206" y="238" text-anchor="middle" class="badge-text" fill="#8b5cf6">Terraform</text>

    <!-- LLM badge -->
    <rect x="252" y="225" width="100" height="20" rx="10" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.35)" stroke-width="1"/>
    <text x="302" y="238" text-anchor="middle" class="badge-text" fill="#00ff88">LLM Pipelines</text>

    <!-- DevOps badge -->
    <rect x="360" y="225" width="64" height="20" rx="10" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.35)" stroke-width="1"/>
    <text x="392" y="238" text-anchor="middle" class="badge-text" fill="#00d4ff">DevOps</text>

    <!-- ECS badge -->
    <rect x="432" y="225" width="54" height="20" rx="10" fill="rgba(255,71,87,0.1)" stroke="rgba(255,71,87,0.35)" stroke-width="1"/>
    <text x="459" y="238" text-anchor="middle" class="badge-text" fill="#ff4757">ECS</text>
  </g>

  <!-- RIGHT: metric cards -->

  <!-- card 1: Revenue -->
  <g class="r3">
    <rect x="550" y="30" width="140" height="68" rx="8" fill="url(#cardGrad)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="620" y="62" text-anchor="middle" class="metric-val shimmer" filter="url(#glow)">€12K</text>
    <text x="620" y="78" text-anchor="middle" class="metric-lbl">CLIENT REVENUE</text>
  </g>

  <!-- card 2: Leads -->
  <g class="r4">
    <rect x="706" y="30" width="140" height="68" rx="8" fill="url(#cardGrad)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="776" y="62" text-anchor="middle" class="metric-val shimmer" fill="#00ff88">8,000</text>
    <text x="776" y="78" text-anchor="middle" class="metric-lbl">LEADS GENERATED</text>
  </g>

  <!-- card 3: Cost reduction -->
  <g class="r5">
    <rect x="550" y="116" width="140" height="68" rx="8" fill="url(#cardGrad)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="620" y="148" text-anchor="middle" class="metric-val shimmer" fill="#8b5cf6">60%</text>
    <text x="620" y="164" text-anchor="middle" class="metric-lbl">COST REDUCTION</text>
  </g>

  <!-- card 4: Cloud spend -->
  <g class="r6">
    <rect x="706" y="116" width="140" height="68" rx="8" fill="url(#cardGrad)" stroke="rgba(255,176,32,0.2)" stroke-width="1"/>
    <text x="776" y="148" text-anchor="middle" class="metric-val shimmer" fill="#ffb020">38%</text>
    <text x="776" y="164" text-anchor="middle" class="metric-lbl">CLOUD SPEND CUT</text>
  </g>

  <!-- card 5: CGPA spanning bottom -->
  <g class="r7">
    <rect x="550" y="202" width="296" height="54" rx="8" fill="url(#cardGrad)" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>
    <text x="698" y="226" text-anchor="middle" class="metric-val shimmer" font-size="16">B.Tech CSE (AI &amp; DS) · CGPA 8.7/10</text>
    <text x="698" y="244" text-anchor="middle" class="metric-lbl">ARYA COLLEGE OF ENGINEERING · RTU · EXP. APRIL 2026</text>
  </g>

  <!-- bottom border glow -->
  <rect x="0" y="275" width="900" height="5" fill="url(#nameGrad)" opacity="0.4"/>
</svg>
